<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jewelry Rebrander Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f3f4f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 480px; box-sizing: border-box; }
        
        h2 { margin: 0 0 15px 0; font-size: 1.3rem; letter-spacing: -0.5px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }

        #customizer { display: none; background: #f8fafc; padding: 15px; border-radius: 18px; border: 1px solid #e2e8f0; margin: 15px 0; }
        canvas { width: 100%; border-radius: 12px; background: #eee; cursor: crosshair; touch-action: none; border: 1px solid #ddd; }
        
        .mode-switcher { display: flex; gap: 8px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; background: #e2e8f0; color: #64748b; }
        .mode-btn.active { background: var(--p); color: white; }

        .btn-toggle { background: #e2e8f0; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; color: #475569; margin-bottom: 10px; }
        .btn-go { background: #000; color: white; border: none; padding: 20px; width: 100%; border-radius: 16px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-go:active { transform: scale(0.98); }
        .status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 700; color: var(--p); }
        
        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Logo Rebranding</h2>

    <div class="group">
        <label>1. Business Logo</label>
        <input type="file" id="logoInp" accept="image/*">
    </div>

    <div class="group">
        <label>2. WhatsApp / Phone</label>
        <input type="text" id="phoneInp" placeholder="+91 00000 00000">
    </div>

    <button class="btn-toggle" onclick="toggleEdit()">⚙️ CUSTOMIZE PLACEMENT</button>

    <div id="customizer">
        <div class="mode-switcher">
            <button id="btnLogoMode" class="mode-btn active" onclick="setMode('logo')">Edit Logo Area</button>
            <button id="btnPhoneMode" class="mode-btn" onclick="setMode('phone')">Edit Phone Area</button>
        </div>
        
        <canvas id="cvs"></canvas>
        
        <div class="flex-row">
            <button onclick="clearCurrentBox()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ccc; font-weight: bold;">Reset Selected</button>
            <div id="colorIndicator" title="Sampled Color" style="width:45px; border-radius:10px; border:1px solid #ccc;"></div>
        </div>
        <p style="font-size: 11px; color: #94a3b8; margin-top: 8px; text-align: center;">Drag on image to set area. Phone area will have a white background.</p>
    </div>

    <div class="group" style="border-top: 1px solid #eee; padding-top: 15px;">
        <label>3. Select Jewelry Batch</label>
        <input type="file" id="batchInp" accept="image/*" multiple>
    </div>

    <button class="btn-go" onclick="startProcess()">PROCESS & DOWNLOAD ZIP</button>
    <div id="status" class="status">Ready</div>
</div>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let brandLogo = null, files = [], logoTarget = null, phoneTarget = null, pickedColor = "#ffffff";
    let editMode = 'logo'; // 'logo' or 'phone'
    let currentImg = null;

    function setMode(mode) {
        editMode = mode;
        document.getElementById('btnLogoMode').className = mode === 'logo' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btnPhoneMode').className = mode === 'phone' ? 'mode-btn active' : 'mode-btn';
        refreshCanvas();
    }

    function toggleEdit() {
        const area = document.getElementById('customizer');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
        if(files.length > 0) loadPreview(files[0]);
    }

    document.getElementById('logoInp').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { brandLogo = new Image(); brandLogo.src = ev.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('batchInp').onchange = (e) => {
        files = Array.from(e.target.files);
        loadPreview(files[0]);
    };

    function loadPreview(file) {
        if(!file) return;
        const img = new Image();
        img.onload = () => {
            currentImg = img;
            cvs.width = img.width; cvs.height = img.height;
            refreshCanvas();
        };
        img.src = URL.createObjectURL(file);
    }

    function refreshCanvas() {
        if(!currentImg) return;
        ctx.drawImage(currentImg, 0, 0);
        
        // Draw Logo Box (Blue)
        if(logoTarget) {
            ctx.fillStyle = pickedColor;
            ctx.fillRect(logoTarget.x, logoTarget.y, logoTarget.w, logoTarget.h);
            ctx.strokeStyle = "#2563eb";
            ctx.lineWidth = 6;
            ctx.strokeRect(logoTarget.x, logoTarget.y, logoTarget.w, logoTarget.h);
            ctx.fillStyle = "#2563eb";
            ctx.font = "bold 30px sans-serif";
            ctx.fillText("LOGO AREA", logoTarget.x, logoTarget.y - 10);
        }

        // Draw Phone Box (Green)
        if(phoneTarget) {
            ctx.fillStyle = "white";
            ctx.fillRect(phoneTarget.x, phoneTarget.y, phoneTarget.w, phoneTarget.h);
            ctx.strokeStyle = "#16a34a";
            ctx.lineWidth = 6;
            ctx.strokeRect(phoneTarget.x, phoneTarget.y, phoneTarget.w, phoneTarget.h);
            ctx.fillStyle = "#16a34a";
            ctx.font = "bold 30px sans-serif";
            ctx.fillText("PHONE AREA", phoneTarget.x, phoneTarget.y - 10);
        }
    }

    let isDrawing = false, startX, startY;

    function handleStart(x, y) {
        isDrawing = true;
        const rect = cvs.getBoundingClientRect();
        startX = (x - rect.left) * (cvs.width / rect.width);
        startY = (y - rect.top) * (cvs.height / rect.height);
        
        if(editMode === 'logo') {
            const p = ctx.getImageData(startX, startY, 1, 1).data;
            pickedColor = `rgb(${p[0]}, ${p[1]}, ${p[2]})`;
            document.getElementById('colorIndicator').style.background = pickedColor;
        }
    }

    function handleEnd(x, y) {
        if(!isDrawing) return;
        const rect = cvs.getBoundingClientRect();
        const endX = (x - rect.left) * (cvs.width / rect.width);
        const endY = (y - rect.top) * (cvs.height / rect.height);
        
        const area = { x: startX, y: startY, w: endX - startX, h: endY - startY };
        
        if(editMode === 'logo') logoTarget = area;
        else phoneTarget = area;
        
        isDrawing = false;
        refreshCanvas();
    }

    cvs.onmousedown = (e) => handleStart(e.clientX, e.clientY);
    cvs.onmouseup = (e) => handleEnd(e.clientX, e.clientY);
    cvs.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY));
    cvs.addEventListener('touchend', (e) => handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY));

    function clearCurrentBox() {
        if(editMode === 'logo') logoTarget = null;
        else phoneTarget = null;
        refreshCanvas();
    }

    async function startProcess() {
        if(!files.length || !brandLogo || !logoTarget) return alert("Please set your Logo and Logo Area first!");
        const zip = new JSZip();
        const phone = document.getElementById('phoneInp').value;

        for(let i=0; i<files.length; i++) {
            document.getElementById('status').innerText = `Processing ${i+1}/${files.length}`;
            const c = await renderFinal(files[i], phone);
            const b = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.9));
            zip.file(`rebranded_${i+1}.jpg`, b);
        }
        
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = "Rebranded_Stock.zip";
        link.click();
        document.getElementById('status').innerText = "Complete!";
    }

    function renderFinal(file, phone) {
        return new Promise(res => {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                const x = c.getContext('2d');
                c.width = img.width; c.height = img.height;
                x.drawImage(img, 0, 0);

                // 1. Logo Logic
                x.fillStyle = pickedColor;
                x.fillRect(logoTarget.x, logoTarget.y, logoTarget.w, logoTarget.h);
                const s = Math.min(logoTarget.w / brandLogo.width, logoTarget.h / brandLogo.height);
                x.drawImage(brandLogo, logoTarget.x, logoTarget.y, brandLogo.width * s, brandLogo.height * s);

                // 2. Phone Logic (Manual Box)
                if(phone && phoneTarget) {
                    x.fillStyle = "white";
                    x.fillRect(phoneTarget.x, phoneTarget.y, phoneTarget.w, phoneTarget.h);
                    x.fillStyle = "black";
                    x.font = `bold ${phoneTarget.h * 0.6}px sans-serif`;
                    x.textAlign = "center";
                    x.textBaseline = "middle";
                    x.fillText(phone, phoneTarget.x + (phoneTarget.w/2), phoneTarget.y + (phoneTarget.h/2));
                }
                res(c);
            };
            img.src = URL.createObjectURL(file);
        });
    }
</script>
</body>
</html>
