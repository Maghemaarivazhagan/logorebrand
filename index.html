<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jewelry Rebrander Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .app-card { background: white; padding: 24px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); width: 100%; max-width: 480px; box-sizing: border-box; }
        
        h2 { margin: 0 0 20px 0; font-size: 1.4rem; letter-spacing: -0.8px; text-align: center; }
        .group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="file"] { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 16px; box-sizing: border-box; outline: none; transition: border 0.2s; }
        input[type="text"]:focus { border-color: var(--p); }

        /* Customizer Styling */
        #customizer { display: none; background: #f1f5f9; padding: 15px; border-radius: 20px; margin: 15px 0; border: 1px solid #e2e8f0; }
        canvas { width: 100%; border-radius: 12px; background: #cbd5e1; cursor: crosshair; touch-action: none; display: block; }
        
        .mode-switcher { display: flex; gap: 8px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; background: #e2e8f0; color: #64748b; transition: all 0.2s; }
        .mode-btn.active { background: var(--p); color: white; box-shadow: 0 4px 10px rgba(37,99,233,0.3); }

        .btn-toggle { background: #fff; border: 2px dashed #cbd5e1; padding: 12px; width: 100%; border-radius: 14px; font-weight: bold; cursor: pointer; color: #64748b; margin-bottom: 10px; }
        .btn-go { background: #000; color: white; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; }
        .btn-go:active { transform: scale(0.96); opacity: 0.9; }
        
        .status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 700; color: var(--p); min-height: 20px; }
        .flex-row { display: flex; gap: 10px; margin-top: 12px; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Logo Rebranding</h2>

    <div class="group">
        <label>1. Business Logo</label>
        <input type="file" id="logoInp" accept="image/*">
    </div>

    <div class="group">
        <label>2. Contact Details</label>
        <input type="text" id="phoneInp" placeholder="Enter Phone or Website">
    </div>

    <button class="btn-toggle" onclick="toggleEdit()">⚙️ Custom Placement (Optional)</button>

    <div id="customizer">
        <div class="mode-switcher">
            <button id="btnLogoMode" class="mode-btn active" onclick="setMode('logo')">Logo Spot</button>
            <button id="btnPhoneMode" class="mode-btn" onclick="setMode('phone')">Phone Spot</button>
        </div>
        <canvas id="cvs"></canvas>
        <div class="flex-row">
            <button onclick="clearCurrentBox()" style="flex:1; padding:10px; border-radius:10px; border:1px solid #cbd5e1; font-weight: bold; background: white;">Reset Selection</button>
            <div id="colorIndicator" style="width:50px; border-radius:10px; border:1px solid #cbd5e1; background: white;"></div>
        </div>
    </div>

    <div class="group" style="border-top: 2px solid #f8fafc; padding-top: 15px;">
        <label>3. Upload Stock Photos</label>
        <input type="file" id="batchInp" accept="image/*" multiple>
    </div>

    <button class="btn-go" onclick="startProcess()">PROCESS & DOWNLOAD</button>
    <div id="status" class="status">Ready</div>
</div>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let brandLogo = null, files = [], logoTarget = null, phoneTarget = null, pickedColor = "#ffffff";
    let editMode = 'logo', currentImg = null, isDrawing = false, startX, startY;

    // UI Toggles
    function toggleEdit() {
        const area = document.getElementById('customizer');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
        if(files.length > 0 && !currentImg) loadPreview(files[0]);
    }

    function setMode(mode) {
        editMode = mode;
        document.getElementById('btnLogoMode').className = mode === 'logo' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btnPhoneMode').className = mode === 'phone' ? 'mode-btn active' : 'mode-btn';
        refreshCanvas();
    }

    // File Handling
    document.getElementById('logoInp').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { brandLogo = new Image(); brandLogo.src = ev.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('batchInp').onchange = (e) => {
        files = Array.from(e.target.files);
        if(files.length > 0) loadPreview(files[0]);
    };

    function loadPreview(file) {
        const img = new Image();
        img.onload = () => {
            currentImg = img;
            cvs.width = img.width; cvs.height = img.height;
            refreshCanvas();
        };
        img.src = URL.createObjectURL(file);
    }

    // drawing and Refresh Logic
    function refreshCanvas() {
        if(!currentImg) return;
        ctx.drawImage(currentImg, 0, 0);
        
        if(logoTarget) {
            ctx.fillStyle = pickedColor;
            ctx.fillRect(logoTarget.x, logoTarget.y, logoTarget.w, logoTarget.h);
            ctx.strokeStyle = "#2563eb"; ctx.lineWidth = 8;
            ctx.strokeRect(logoTarget.x, logoTarget.y, logoTarget.w, logoTarget.h);
        }

        if(phoneTarget) {
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.fillRect(phoneTarget.x, phoneTarget.y, phoneTarget.w, phoneTarget.h);
            ctx.strokeStyle = "#16a34a"; ctx.lineWidth = 8;
            ctx.strokeRect(phoneTarget.x, phoneTarget.y, phoneTarget.w, phoneTarget.h);
        }
    }

    function handleStart(x, y) {
        isDrawing = true;
        const rect = cvs.getBoundingClientRect();
        startX = (x - rect.left) * (cvs.width / rect.width);
        startY = (y - rect.top) * (cvs.height / rect.height);
        
        if(editMode === 'logo') {
            const p = ctx.getImageData(startX, startY, 1, 1).data;
            pickedColor = `rgb(${p[0]}, ${p[1]}, ${p[2]})`;
            document.getElementById('colorIndicator').style.background = pickedColor;
        }
    }

    function handleMove(x, y) {
        if(!isDrawing) return;
        const rect = cvs.getBoundingClientRect();
        const curX = (x - rect.left) * (cvs.width / rect.width);
        const curY = (y - rect.top) * (cvs.height / rect.height);
        
        const area = { x: startX, y: startY, w: curX - startX, h: curY - startY };
        if(editMode === 'logo') logoTarget = area;
        else phoneTarget = area;
        
        // Use requestAnimationFrame for smooth mobile rendering
        requestAnimationFrame(refreshCanvas);
    }

    // Input Listeners
    cvs.onmousedown = (e) => handleStart(e.clientX, e.clientY);
    cvs.onmousemove = (e) => handleMove(e.clientX, e.clientY);
    window.onmouseup = () => isDrawing = false;

    cvs.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY));
    cvs.addEventListener('touchmove', (e) => {
        handleMove(e.touches[0].clientX, e.touches[0].clientY);
        e.preventDefault();
    }, {passive: false});
    cvs.addEventListener('touchend', () => isDrawing = false);

    function clearCurrentBox() {
        if(editMode === 'logo') logoTarget = null;
        else phoneTarget = null;
        refreshCanvas();
    }

    // processing and Auto-Reset
    async function startProcess() {
        if(!files.length || !brandLogo) return alert("Please select logo and stock images!");
        const zip = new JSZip();
        const phone = document.getElementById('phoneInp').value;
        const status = document.getElementById('status');

        for(let i=0; i<files.length; i++) {
            status.innerText = `Finalizing ${i+1}/${files.length}...`;
            const canvas = await renderImage(files[i], phone);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
            zip.file(`rebranded_${i+1}.jpg`, blob);
        }
        
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = "Rebranded_Stock.zip";
        link.click();
        
        status.innerText = "Success! Clearing...";
        setTimeout(resetApp, 1500);
    }

    function resetApp() {
        files = []; 
        document.getElementById('batchInp').value = "";
        document.getElementById('status').innerText = "Ready";
        currentImg = null;
        ctx.clearRect(0,0,cvs.width, cvs.height);
    }

    function renderImage(file, phone) {
        return new Promise(res => {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                const x = c.getContext('2d');
                c.width = img.width; c.height = img.height;
                x.drawImage(img, 0, 0);

                // Smart Logo Placement (Custom or Default)
                let lBox = logoTarget || { x: 40, y: 40, w: c.height*0.18, h: c.height*0.18 };
                if(logoTarget) {
                    x.fillStyle = pickedColor;
                    x.fillRect(lBox.x, lBox.y, lBox.w, lBox.h);
                }
                const s = Math.min(lBox.w / brandLogo.width, lBox.h / brandLogo.height);
                x.drawImage(brandLogo, lBox.x, lBox.y, brandLogo.width * s, brandLogo.height * s);

                // Smart Phone Placement (Custom or Default)
                if(phone) {
                    if(phoneTarget) {
                        x.fillStyle = "white"; x.fillRect(phoneTarget.x, phoneTarget.y, phoneTarget.w, phoneTarget.h);
                        x.fillStyle = "black"; x.font = `bold ${phoneTarget.h * 0.6}px sans-serif`;
                        x.textAlign = "center"; x.textBaseline = "middle";
                        x.fillText(phone, phoneTarget.x + (phoneTarget.w/2), phoneTarget.y + (phoneTarget.h/2));
                    } else {
                        const bh = c.height * 0.08;
                        x.fillStyle = "white"; x.fillRect(0, c.height - bh, c.width, bh);
                        x.fillStyle = "black"; x.font = `bold ${bh * 0.45}px sans-serif`;
                        x.textAlign = "right"; x.fillText(phone, c.width - 40, c.height - bh/2 + 10);
                    }
                }
                res(c);
            };
            img.src = URL.createObjectURL(file);
        });
    }
</script>
</body>
</html>
